<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainy Hub - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Animation des couleurs du fond */
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0284c7, #4338ca, #3b0764);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Motif texte style fond WhatsApp (Abondant et Animé) */
        .pattern-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='600' height='600' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='rgba(255,255,255,0.05)' font-family='sans-serif' font-size='16' font-weight='bold' transform='rotate(-25 300 300)'%3E%3Ctext x='50' y='100'%3EBrainy Agency%3C/text%3E%3Ctext x='350' y='150'%3E%2B22896368928%3C/text%3E%3Ctext x='100' y='300'%3EVotre r%C3%A9ussite %C3%A0 la pointe de la Technologie.%3C/text%3E%3Ctext x='400' y='450'%3EBrainy Agency%3C/text%3E%3Ctext x='50' y='550'%3E%2B22896368928%3C/text%3E%3Ctext x='250' y='650'%3EVotre r%C3%A9ussite %C3%A0 la pointe de la Technologie.%3C/text%3E%3C/g%3E%3C/svg%3E");
            background-repeat: repeat;
            z-index: 0;
            pointer-events: none;
            animation: scrollPattern 40s linear infinite;
        }

        @keyframes scrollPattern {
            0% { background-position: 0px 0px; }
            100% { background-position: 600px 600px; }
        }

        /* 3. Images qui défilent en rond (Orbites) */
        .orbit-container {
            position: absolute;
            top: 50%; left: 50%;
            width: 650px; height: 650px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            animation: orbit 30s linear infinite;
            z-index: 1;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .orbit-img {
            position: absolute;
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 195, 255, 0.5);
            animation: counter-orbit 30s linear infinite;
        }

        /* Répartition des 9 images tout autour du cercle */
        .img-1 { top: -45px; left: 280px; }
        .img-2 { top: 31px; left: 489px; }
        .img-3 { top: 224px; left: 600px; }
        .img-4 { top: 443px; left: 562px; }
        .img-5 { top: 585px; left: 391px; }
        .img-6 { top: 585px; left: 169px; }
        .img-7 { top: 443px; left: -2px; }
        .img-8 { top: 224px; left: -40px; }
        .img-9 { top: 31px; left: 71px; }

        @keyframes orbit {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes counter-orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        /* 4. Effet Vitré (Glassmorphism) */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.7); }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .hidden { display: none !important; }

        /* ========================================== */
        /* ADAPTATION SECURE POUR TOUS LES MOBILES   */
        /* ========================================== */
        @media (max-width: 768px) {
            .orbit-container {
                /* Réduction proportionnelle du grand cercle sur tablette */
                transform: translate(-50%, -50%) scale(0.7);
            }
            .glass-card {
                padding: 2rem;
            }
        }

        @media (max-width: 480px) {
            .orbit-container {
                /* Réduction idéale du grand cercle sur petit écran mobile */
                transform: translate(-50%, -50%) scale(0.48);
            }
            .glass-card {
                padding: 1.75rem;
                margin-left: 1rem;
                margin-right: 1rem;
            }
            .glass-card h2 {
                font-size: 1.875rem; /* Adaptation légère du titre principal */
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

    <div class="pattern-overlay"></div>

    <div class="orbit-container">
        <img src="source/image1.jpg" class="orbit-img img-1" alt="Image 1">
        <img src="source/image2.jpg" class="orbit-img img-2" alt="Image 2">
        <img src="source/image3.jpg" class="orbit-img img-3" alt="Image 3">
        <img src="source/image4.jpg" class="orbit-img img-4" alt="Image 4">
        <img src="source/image5.jpg" class="orbit-img img-5" alt="Image 5">
        <img src="source/image6.jpg" class="orbit-img img-6" alt="Image 6">
        <img src="source/image7.jpg" class="orbit-img img-7" alt="Image 7">
        <img src="source/image8.jpg" class="orbit-img img-8" alt="Image 8">
        <img src="source/image9.jpg" class="orbit-img img-9" alt="Image 9">
    </div>

    <div class="glass-card p-10 w-full max-w-md mx-4 hover:shadow-2xl hover:border-white/40">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold tracking-tight drop-shadow-md">Brainy Hub<span class="text-blue-400">.</span></h2>
            <p class="text-sm font-light text-blue-200 mt-2 tracking-wider uppercase drop-shadow">Espace Connecté</p>
        </div>
        
        <form id="login-form">
            <div class="mb-5">
                <label class="block text-white text-sm font-bold mb-2 drop-shadow-sm">Email ou Matricule</label>
                <input type="text" id="login-email" class="glass-input w-full py-3 px-4 rounded-xl transition duration-200" placeholder="admin@brainy.com ou Matricule" required>
            </div>
            <div class="mb-8">
                <label class="block text-white text-sm font-bold mb-2 drop-shadow-sm">Mot de passe</label>
                <input type="password" id="login-password" class="glass-input w-full py-3 px-4 rounded-xl transition duration-200" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-white text-blue-800 font-extrabold py-3 px-4 rounded-xl shadow-lg hover:bg-blue-50 hover:scale-105 transform transition duration-300">
                Se connecter
            </button>
        </form>
        
        <p id="login-error" class="bg-red-500/80 backdrop-blur-md text-white text-sm mt-6 p-3 rounded-lg text-center font-semibold hidden border border-red-400"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5FKEZ4KhKwHJu_oWBm--qPy7wEmmeRLo",
            authDomain: "site-de-suivi-c31be.firebaseapp.com",
            projectId: "site-de-suivi-c31be",
            storageBucket: "site-de-suivi-c31be.firebasestorage.app",
            messagingSenderId: "152056159364",
            appId: "1:152056159364:web:a6f44e1f7078b032c4b6d1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ROUTAGE AUTOMATIQUE SI DEJA CONNECTÉ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email === "admin@brainy.com") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "stagiaire.html";
                }
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            let loginInput = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!loginInput.includes('@')) {
                loginInput = loginInput.toLowerCase().replace(/\s/g, '') + '@brainy.com';
            }

            try {
                await signInWithEmailAndPassword(auth, loginInput, password);
                document.getElementById('login-error').classList.add('hidden');
            } catch (error) {
                document.getElementById('login-error').textContent = "Identifiants incorrects. Veuillez réessayer.";
                document.getElementById('login-error').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
